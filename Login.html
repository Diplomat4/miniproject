<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MK Print Solutions | Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body class="auth-page login-page">
    <nav class="navbar">
        <a class="brand" href="index.html">MK Print Solutions</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="Dashboard.html">Dashboard</a>
        </div>
    </nav>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Login</h2>
                <p>Enter ID/Registration No, password, then generate OTP. All fields are mandatory.</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginId">Employee/Customer ID or Registration No</label>
                    <input type="text" id="loginId" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="otp-row">
                    <div class="form-group">
                        <label for="loginOtp">OTP</label>
                        <input type="text" id="loginOtp" maxlength="4" required>
                    </div>
                    <button type="button" class="btn btn-secondary" id="generateOtpBtn">Generate OTP</button>
                </div>
                <div class="hint-box">Sample users:<br>Employee: empA / ABCD / 2345<br>Customer: custA / PQRS / 6789</div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <div class="toggle-section">
                <span>Not registered yet?</span>
                <a class="link-btn" href="Register.html">Register here</a>
            </div>
            <div class="auth-message" id="loginMessage"></div>
        </div>
    </div>
</body>
</html>
